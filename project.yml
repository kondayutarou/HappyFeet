attributes:
  LastSwiftUpdateCheck: '1340'
  LastUpgradeCheck: '1340'
configs:
  Debug: debug
  Release: release
name: HappyFeet
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 0.9.0
options:
  defaultConfig: Release
  groupSortPosition: bottom
  transitivelyLinkDependencies: false
schemes:
  HappyFeet:
    analyze:
      config: Debug
    archive:
      config: Release
    build:
      targets:
        HappyFeet:
        - running
        - testing
        - profiling
        - analyzing
        - archiving
    profile:
      config: Release
    run:
      config: Debug
    test:
      config: Debug
      targets:
      - Tests_HappyFeet
settings:
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O
targets:
  HappyFeet:
    platform: iOS
    productName: HappyFeet
    settings:
      base:
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: '1'
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9HMJHW357X
        GENERATE_INFOPLIST_FILE: 'YES'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: 'YES'
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: 'YES'
        INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
          UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        IPHONEOS_DEPLOYMENT_TARGET: '15.5'
        LD_RUNPATH_SEARCH_PATHS:
        - $(inherited)
        - '@executable_path/Frameworks'
        MARKETING_VERSION: '1.0'
        PRODUCT_BUNDLE_IDENTIFIER: com.yutaro-konda.HappyFeet
        PRODUCT_NAME: HappyFeet
        SDKROOT: iphoneos
        SWIFT_EMIT_LOC_STRINGS: 'YES'
        SWIFT_VERSION: '5.0'
        TARGETED_DEVICE_FAMILY: '1'
      configs:
        Debug:
        Release:
    sources:
    - path: HF
    dependencies:
      - package: ComposableArchitecture
    type: application
  Tests_HappyFeet:
    dependencies:
    - target: HappyFeet
    platform: iOS
    productName: HappyFeet_Test
    settings:
      base:
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: 'YES'
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: '1'
        DEVELOPMENT_TEAM: 9HMJHW357X
        GENERATE_INFOPLIST_FILE: 'YES'
        IPHONEOS_DEPLOYMENT_TARGET: '15.5'
        MARKETING_VERSION: '1.0'
        PRODUCT_BUNDLE_IDENTIFIER: com.yutaro-konda.Tests-iOS
        SDKROOT: iphoneos
        SWIFT_EMIT_LOC_STRINGS: 'NO'
        SWIFT_VERSION: '5.0'
        TARGETED_DEVICE_FAMILY: 1,2
        TEST_TARGET_NAME: HappyFeet (iOS)
    sources:
    - path: HF_Test
    dependencies:
    - package: ComposableArchitecture
    type: bundle.unit-test
